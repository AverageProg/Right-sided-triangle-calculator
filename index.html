<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calc.css">
    <title>Calculate right-sided triangle!</title>
</head>
<body onload = "draw()">
    <h1>Calculate a Right-sided Triangle's sin,cos and tan!</h1>
    <canvas id ="canvas" width="150" height="150" style="border: 1px solid #000;"></canvas><br><br>
    <div class ="input">
        <!-- <label class = "mylabel">Enter values (convert radians to degrees)</label><br><br>
        <input id="sin">enter sin of triangle</input><br><br>
        <input id="cos">enter cos of triangle</input><br><br>
        <input id="tan">enter tan of triangle</input><br><br>
        <div class ="result0">
            <p id ="result"></p>
            <p id ="result1"></p>
            <p id ="result2"></p>
            <p id ="result3"></p>
        </div><br><br> -->

        <label class = "mylabel">Enter values(triangle sides(converting into degrees), leave hypotenus empty if unknown)</label><br><br>
        <input id="a" placeholder="enter a side of triangle"></input><br><br>
        <input id="b" placeholder="enter b of triangle"></input><br><br>
        <input id="c" placeholder="enter c of triangle(hypotenuse)"></input><br><br>
        

        <div class="result01">
            <p id ="side-sin"></p>
            <p id ="side-cos"></p>
            <p id ="side-tan"></p>
            <p id ="pythagorean theorem"></p>
        </div>

        <label class = "mylabel">Enter values(sin,cos,tan and known sides! leave unknown empty)</label><br><br>
        <input id="sin" placeholder="enter sin(degrees) of triangle"></input><br><br>
        <input id="cos" placeholder="enter cos(degrees) of triangle"></input><br><br>
        <input id="tan" placeholder="enter tan(degrees) of triangle"></input><br><br>
        <input id="opposite" placeholder="enter opposite of triangle(cm)"></input><br><br>
        <input id="adjacent" placeholder="enter adjacent of triangle(cm)"></input><br><br>
        <input id="hypotenuse" placeholder="enter hypotenuse of triangle(cm)"></input><br><br>
        <button id ="Btn">submit</button><br><br>

        <button id ="reset">reset</button><br><br>

        <div class ="result02">
            <p id ="sidea"></p>
            <p id ="sideb"></p>
            <p id ="sidec"></p>
        </div>
    </div>


    <script src = "calc.js"></script>
</body>
</html>
